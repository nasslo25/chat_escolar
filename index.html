<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recreo Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#8b5cf6',
                        'secondary': '#ec4899',
                        'accent': '#f59e0b',
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4c1d95 0%, #7e22ce 50%, #db2777 100%);
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 10px; }
        .chat-scroll::-webkit-scrollbar-thumb:hover { background: #c084fc; }

        .avatar-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .avatar-btn:hover { transform: scale(1.15) rotate(5deg); }
        .avatar-selected {
            background-color: #fef08a !important;
            border-color: #f59e0b !important;
            transform: scale(1.2) rotate(-5deg) !important;
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .bubble-me {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: white;
            box-shadow: 0 4px 15px -3px rgba(217, 70, 239, 0.4);
        }

        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                z-index: 40;
                height: 100%;
                width: 80%;
                max-width: 300px;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="h-[100dvh] w-full flex items-center justify-center overflow-hidden relative">

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="login-screen" class="glass-panel p-5 sm:p-8 m-4 rounded-3xl shadow-2xl w-full max-w-lg text-center relative overflow-y-auto no-scrollbar max-h-[90dvh] transition-all duration-500 transform z-50">
        <div class="absolute -top-6 -left-6 text-6xl opacity-20 animate-bounce-slow">✨</div>
        <div class="absolute -bottom-4 -right-4 text-6xl opacity-20 animate-pulse">🎈</div>

        <div class="inline-block bg-white p-4 rounded-full shadow-lg mb-4">
            <span class="text-5xl">🏫</span>
        </div>
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-2">Recreo Virtual</h1>
        <p class="text-gray-500 mb-8 font-medium">Elige tu personaje y entra a la diversión</p>

        <div class="mb-6 relative">
            <input type="text" id="username-input" placeholder="¿Cómo te llamas?" class="w-full px-5 py-4 rounded-2xl border-2 border-purple-100 bg-white/50 focus:bg-white focus:border-primary focus:ring-4 focus:ring-purple-100 focus:outline-none transition-all text-lg font-semibold text-gray-700 shadow-inner" maxlength="15">
        </div>

        <p class="text-sm font-bold text-gray-400 mb-4 text-left uppercase tracking-wider">Selecciona tu Avatar:</p>
        <div class="flex justify-center gap-3 mb-8 flex-wrap" id="avatar-container"></div>

        <button id="join-btn" class="w-full bg-gradient-to-r from-primary to-secondary hover:from-purple-600 hover:to-pink-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 text-lg">
            ¡Entrar al Patio! <i data-lucide="rocket" class="w-6 h-6"></i>
        </button>
        <p id="login-error" class="text-red-500 font-semibold text-sm mt-4 hidden bg-red-50 py-2 rounded-lg">¡Ups! Escribe tu nombre y elige un avatar.</p>
    </div>

    <div id="chat-screen" class="hidden w-full h-full sm:max-w-6xl sm:h-[95dvh] glass-panel sm:rounded-3xl rounded-none shadow-none sm:shadow-2xl flex overflow-hidden relative border-0 sm:border-4 border-white">
        
        <div id="sidebar-overlay" class="hidden absolute inset-0 bg-black/40 z-30 md:hidden backdrop-blur-sm transition-opacity"></div>

        <aside id="sidebar" class="w-full md:w-72 bg-white/90 border-r border-purple-100 flex flex-col shadow-xl md:shadow-none flex-shrink-0">
            <div class="p-4 bg-gradient-to-r from-purple-600 to-primary text-white flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="users" class="w-5 h-5"></i> En Línea</h3>
                <button id="close-sidebar-btn" class="md:hidden p-1 bg-white/20 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <button id="btn-global-chat" class="flex items-center gap-3 p-4 border-b border-gray-100 hover:bg-purple-50 transition-colors w-full text-left bg-purple-50/50">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-xl text-white shadow-md">🏫</div>
                <div>
                    <p class="font-bold text-gray-800 text-sm">Patio Central (Global)</p>
                    <p class="text-[11px] text-primary font-bold tracking-wider uppercase">Sala principal</p>
                </div>
            </button>

            <div id="online-users-list" class="flex-grow overflow-y-auto chat-scroll p-2 flex flex-col gap-1"></div>
            
            <div class="p-4 bg-gray-50 border-t border-purple-100 flex items-center gap-3 mt-auto">
                <div id="current-user-avatar-sidebar" class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-2xl border-2 border-accent shadow-sm"></div>
                <div class="flex-grow overflow-hidden">
                    <p class="font-bold text-sm text-gray-800 truncate" id="current-user-name-sidebar">Usuario</p>
                    <p class="text-xs text-green-500 font-bold flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse"></span> Tú</p>
                </div>
                <button id="logout-btn" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-xl transition-all" title="Salir">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </aside>

        <div class="flex-grow flex flex-col min-w-0 bg-white/40">
            <header class="bg-gradient-to-r from-primary via-purple-500 to-secondary text-white p-3 sm:p-4 flex justify-between items-center shadow-md z-10">
                <div class="flex items-center gap-2 sm:gap-3">
                    <button id="menu-btn" class="md:hidden p-2 bg-white/20 hover:bg-white/30 rounded-xl transition-colors">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <div class="bg-white/20 backdrop-blur-sm p-2 sm:p-2.5 rounded-xl shadow-sm border border-white/30 hidden sm:flex items-center justify-center">
                        <span id="chat-header-icon" class="text-xl sm:text-2xl drop-shadow-md">🎮</span>
                    </div>
                    <div>
                        <h2 id="chat-header-title" class="font-extrabold text-lg sm:text-xl tracking-wide truncate max-w-[150px] sm:max-w-xs">Patio Central</h2>
                        <p id="chat-header-subtitle" class="text-[10px] sm:text-xs text-purple-100 flex items-center gap-1.5 font-medium">
                            <span class="w-2 sm:w-2.5 h-2 sm:h-2.5 rounded-full bg-green-300 shadow-[0_0_8px_rgba(134,239,172,0.8)] animate-pulse"></span> 
                            <span id="online-count">Buscando amigos...</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-2 sm:gap-3">
                    <button id="video-btn" class="bg-emerald-400 hover:bg-emerald-500 text-white p-2 sm:p-2.5 rounded-lg sm:rounded-xl shadow-lg transition-all hover:-translate-y-1" title="Videollamada">
                        <i data-lucide="video" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                    </button>
                </div>
            </header>

            <div id="video-call-container" class="hidden w-full h-[35vh] md:h-[45vh] bg-gray-900 border-b-4 border-primary relative flex-shrink-0 shadow-inner">
                <div id="video-overlay" class="absolute inset-0 flex items-center justify-center text-white bg-gray-900 z-0">
                    <div class="text-center">
                        <i data-lucide="loader-2" class="w-12 h-12 animate-spin mx-auto mb-3 text-accent"></i>
                        <p class="font-semibold tracking-wider text-purple-200">Conectando cámaras...</p>
                    </div>
                </div>
            </div>

            <main id="messages-container" class="flex-grow p-4 md:p-6 overflow-y-auto chat-scroll bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] flex flex-col gap-5 relative">
                </main>

            <footer class="bg-white p-3 sm:p-4 border-t border-purple-100 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10 pb-4">
                <form id="chat-form" class="flex gap-2 sm:gap-3 relative max-w-4xl mx-auto items-center">
                    <input type="text" id="message-input" placeholder="Escribe un mensaje cool..." class="flex-grow bg-purple-50 border-2 border-purple-100 text-gray-800 text-sm sm:text-base rounded-xl sm:rounded-2xl focus:ring-4 focus:ring-purple-200 focus:border-primary block w-full p-3 sm:p-4 transition-all outline-none font-medium shadow-inner" autocomplete="off">
                    <button type="submit" id="send-btn" class="text-white bg-gradient-to-r from-primary to-secondary hover:from-purple-600 hover:to-pink-600 focus:ring-4 focus:outline-none focus:ring-purple-300 font-bold rounded-xl sm:rounded-2xl text-sm px-4 py-3 sm:px-6 sm:py-4 text-center inline-flex items-center transition-all transform hover:scale-105 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="send" class="w-5 h-5 sm:w-6 sm:h-6 sm:mr-1"></i>
                        <span class="hidden sm:inline">Enviar</span>
                    </button>
                </form>
            </footer>
        </div>
    </div>

    <script type="module">
        // Se agregó "where" y "Timestamp" a las importaciones
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, setDoc, doc, where, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        lucide.createIcons();

        // TU CONFIGURACIÓN
        const firebaseConfig = {
          apiKey: "AIzaSyCtZN4Pyu10EnFvKgv_s8k0HzrHzf8NUCs",
          authDomain: "chat-escolar-e5141.firebaseapp.com",
          projectId: "chat-escolar-e5141",
          storageBucket: "chat-escolar-e5141.firebasestorage.app",
          messagingSenderId: "1050464344134",
          appId: "1:1050464344134:web:18078a85e653eba556d247",
          measurementId: "G-VZW55MYY4E"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = { name: '', avatar: '' };
        let activeChatId = 'global'; 
        let activeChatInfo = { name: 'Patio Central', avatar: '🎮', isPrivate: false };
        let isFirstLoad = true;
        let unsubscribeMessages = null;
        let unsubscribePresence = null;
        let heartbeatInterval = null;
        let sessionStartTime = null; // NUEVA VARIABLE PARA GUARDAR LA HORA DE ENTRADA

        const avataresDisponibles = [
            '🦊', '🐱', '🐶', '🐼', '🐸', '🦄', '🐧', '🦖', 
            '🦁', '🐵', '🦉', '🐙', '🐢', '🦋', '👽', '👻',
            '🤖', '🤡', '🤠', '😎'
        ];

        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const notificationSound = document.getElementById('notification-sound');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const chatForm = document.getElementById('chat-form');

        const avatarContainer = document.getElementById('avatar-container');
        avataresDisponibles.forEach(avatar => {
            const btn = document.createElement('button');
            btn.className = 'avatar-btn w-10 h-10 sm:w-14 sm:h-14 text-xl sm:text-3xl bg-gray-50 rounded-xl sm:rounded-2xl border-2 border-gray-200 hover:bg-white hover:border-purple-300 hover:shadow-md focus:outline-none flex items-center justify-center';
            btn.innerText = avatar;
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#avatar-container button').forEach(b => b.classList.remove('avatar-selected'));
                e.currentTarget.classList.add('avatar-selected');
                userData.avatar = avatar;
                document.getElementById('login-error').classList.add('hidden');
            });
            avatarContainer.appendChild(btn);
        });

        document.getElementById('join-btn').addEventListener('click', async (e) => {
            const name = usernameInput.value.trim();
            if (!name || !userData.avatar) {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                loginScreen.classList.add('animate-pulse');
                setTimeout(() => loginScreen.classList.remove('animate-pulse'), 500);
                return;
            }

            notificationSound.load();
            userData.name = name;
            e.currentTarget.disabled = true;
            e.currentTarget.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-6 h-6"></i> Entrando...';
            lucide.createIcons();

            try { 
                const cred = await signInAnonymously(auth); 
                currentUser = cred.user;
                sessionStartTime = Timestamp.now(); // AQUÍ GUARDAMOS EL MOMENTO EXACTO DE ENTRADA
                
                try {
                    mostrarChat();
                    iniciarPresencia();
                    escucharUsuariosConectados();
                    abrirChat('global', 'Patio Central', '🎮');
                } catch (errData) {
                    console.error("Error al cargar datos iniciales:", errData);
                    mostrarChat();
                    if (messagesContainer) {
                        messagesContainer.innerHTML = `<div class="absolute inset-0 flex justify-center items-center bg-white/80 backdrop-blur-sm z-50 flex-col gap-3"><p class="text-red-500 font-bold text-center">Conectado, esperando datos de la base...</p></div>`;
                    }
                }
            } 
            catch (error) {
                console.error("Error de Autenticación:", error);
                const btn = document.getElementById('join-btn');
                const errText = document.getElementById('login-error');
                
                if (error.code === 'auth/operation-not-allowed') {
                    errText.innerText = "Error: Debes habilitar 'Anónimo' en Firebase > Authentication > Sign-in method.";
                } else {
                    errText.innerText = "Error al conectar: " + error.message;
                }
                
                errText.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '¡Entrar al Patio! <i data-lucide="rocket" class="w-6 h-6"></i>';
                lucide.createIcons();
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                currentUser = null;
                mostrarLogin();
                detenerTodo();
            }
        });

        function mostrarChat() {
            loginScreen.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                loginScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                chatScreen.classList.add('animate-[bounce_0.5s_ease-out]');
                
                document.getElementById('current-user-name-sidebar').innerText = userData.name;
                document.getElementById('current-user-avatar-sidebar').innerText = userData.avatar;
                
                setTimeout(() => messageInput.focus(), 300);
            }, 300);
        }

        function mostrarLogin() {
            chatScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden', 'opacity-0', 'scale-95');
            const joinBtn = document.getElementById('join-btn');
            joinBtn.disabled = false;
            joinBtn.innerHTML = '¡Entrar al Patio! <i data-lucide="rocket" class="w-6 h-6"></i>';
            lucide.createIcons();
        }

        function detenerTodo() {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribePresence) unsubscribePresence();
            if (heartbeatInterval) clearInterval(heartbeatInterval);
        }

        function iniciarPresencia() {
            if(!currentUser) return;
            const userRef = doc(db, 'usuarios_conectados', currentUser.uid);
            const actualizarEstado = async () => {
                try {
                    await setDoc(userRef, { 
                        name: userData.name, 
                        avatar: userData.avatar, 
                        lastSeen: Date.now() 
                    }, { merge: true });
                } catch (e) {
                    console.error("No se pudo actualizar estado:", e);
                }
            };
            actualizarEstado();
            heartbeatInterval = setInterval(actualizarEstado, 30000);
        }

        function escucharUsuariosConectados() {
            const queryRef = collection(db, 'usuarios_conectados');
            unsubscribePresence = onSnapshot(queryRef, (snapshot) => {
                const ahora = Date.now();
                const listContainer = document.getElementById('online-users-list');
                listContainer.innerHTML = '';
                let count = 0;

                let misNotificaciones = {};
                snapshot.forEach((docSnap) => {
                    if (docSnap.id === currentUser.uid) {
                        misNotificaciones = docSnap.data().notificaciones || {};
                    }
                });

                window.lastNotifTimes = window.lastNotifTimes || {};

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const uid = docSnap.id;
                    if (ahora - data.lastSeen < 90000) {
                        count++;
                        if (uid !== currentUser.uid) {
                            const hasUnread = misNotificaciones[uid] > 0 && activeChatId !== generarIdPrivado(uid);
                            crearBotonUsuarioOnline(uid, data.name, data.avatar, listContainer, hasUnread);

                            if (hasUnread && (!window.lastNotifTimes[uid] || misNotificaciones[uid] > window.lastNotifTimes[uid])) {
                                window.lastNotifTimes[uid] = misNotificaciones[uid];
                                try { notificationSound.play(); } catch(e){} 
                            }
                        }
                    }
                });
                document.getElementById('online-count').innerText = `${count} conectados 🔥`;
            });
        }

        function crearBotonUsuarioOnline(uid, name, avatar, container, hasUnread = false) {
            const btn = document.createElement('button');
            const isSelected = activeChatId === generarIdPrivado(uid);
            
            let baseClasses = 'flex items-center gap-3 p-2 rounded-xl transition-all w-full text-left group ';
            if (isSelected) {
                baseClasses += 'bg-purple-100 border border-purple-200 shadow-inner';
            } else if (hasUnread) {
                baseClasses += 'bg-red-50 border border-red-300 shadow-md animate-[pulse_2s_ease-in-out_infinite]';
            } else {
                baseClasses += 'hover:bg-gray-50 bg-white border border-transparent';
            }
            btn.className = baseClasses;
            
            const statusIndicator = hasUnread 
                ? `<div class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 border-2 border-white rounded-full animate-bounce shadow-sm"></div>`
                : `<div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></div>`;
            
            btn.innerHTML = `
                <div class="relative flex-shrink-0">
                    <div class="w-10 h-10 rounded-xl bg-white border ${isSelected ? 'border-primary' : (hasUnread ? 'border-red-400' : 'border-gray-200')} flex items-center justify-center text-xl shadow-sm">${avatar}</div>
                    ${statusIndicator}
                </div>
                <div class="overflow-hidden flex-grow">
                    <p class="font-bold text-sm ${isSelected ? 'text-primary' : (hasUnread ? 'text-red-600' : 'text-gray-700')} truncate">${escapeHTML(name)}</p>
                    <p class="text-[10px] ${hasUnread ? 'text-red-500 font-bold' : 'text-gray-400 font-semibold'} uppercase tracking-wider group-hover:text-primary transition-colors">
                        ${hasUnread ? '¡Nuevo Mensaje!' : 'Chat Privado'}
                    </p>
                </div>
            `;
            
            btn.onclick = () => abrirChat(generarIdPrivado(uid), name, avatar, true);
            container.appendChild(btn);
        }

        function generarIdPrivado(otroUid) {
            return [currentUser.uid, otroUid].sort().join('_');
        }

        document.getElementById('btn-global-chat').addEventListener('click', () => {
            abrirChat('global', 'Patio Central', '🎮', false);
        });

        function abrirChat(chatId, nombre, avatar, esPrivado = false) {
            if (activeChatId === chatId && !isFirstLoad) return;

            activeChatId = chatId;
            activeChatInfo = { name: nombre, avatar: avatar, isPrivate: esPrivado };
            isFirstLoad = false;

            document.getElementById('chat-header-title').innerText = esPrivado ? `Privado: ${escapeHTML(nombre)}` : 'Patio Central';
            document.getElementById('chat-header-subtitle').innerHTML = esPrivado 
                ? '<span class="text-purple-200">🔒 Solo ustedes dos</span>' 
                : `<span class="w-2 sm:w-2.5 h-2 sm:h-2.5 rounded-full bg-green-300 shadow-[0_0_8px_rgba(134,239,172,0.8)] animate-pulse"></span> <span id="online-count">Cargando...</span>`;
            document.getElementById('chat-header-icon').innerText = avatar;

            if (esPrivado && currentUser) {
                const otroUid = chatId.split('_').find(id => id !== currentUser.uid);
                if (otroUid) {
                    const myRef = doc(db, 'usuarios_conectados', currentUser.uid);
                    setDoc(myRef, { notificaciones: { [otroUid]: 0 } }, { merge: true }).catch(e=>console.log(e));
                }
            }

            cerrarSidebar();
            escucharUsuariosConectados(); 
            cargarMensajesSala();
        }

        function cargarMensajesSala() {
            if (unsubscribeMessages) unsubscribeMessages();
            
            messagesContainer.innerHTML = `
                <div id="loading-messages" class="absolute inset-0 flex justify-center items-center bg-white/80 backdrop-blur-sm z-50 flex-col gap-3 text-primary">
                    <i data-lucide="loader-2" class="w-10 h-10 animate-spin"></i>
                    <p class="font-bold">Cargando mensajes...</p>
                </div>
            `;
            lucide.createIcons();

            const coleccionStr = activeChatId === 'global' ? 'mensajes_colegio' : `chats_privados/${activeChatId}/mensajes`;
            const messagesRef = collection(db, coleccionStr);
            
            // LA CLAVE ESTÁ AQUÍ: Filtramos para traer solo mensajes nuevos a partir de que entró el usuario
            const q = query(messagesRef, where("createdAt", ">=", sessionStartTime)); 
            
            let loadInitial = true;

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const loader = document.getElementById('loading-messages');
                if (loader) loader.remove();
                
                let mensajes = [];
                snapshot.forEach((docSnap) => mensajes.push({ id: docSnap.id, ...docSnap.data() }));
                
                mensajes.sort((a, b) => {
                    const tA = (a.createdAt && typeof a.createdAt.toMillis === 'function') ? a.createdAt.toMillis() : Date.now();
                    const tB = (b.createdAt && typeof b.createdAt.toMillis === 'function') ? b.createdAt.toMillis() : Date.now();
                    return tA - tB;
                });

                if(mensajes.length > 100) mensajes = mensajes.slice(mensajes.length - 100);

                renderizarMensajes(mensajes);

                if (!loadInitial) {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === "added" && change.doc.data().uid !== currentUser.uid) {
                            try { notificationSound.play(); } catch(e){} 
                        }
                    });
                }
                loadInitial = false;
            }, (error) => {
                console.error("Error al leer Firestore:", error);
                messagesContainer.innerHTML = `<div class="p-4 bg-red-100 text-red-600 rounded-xl m-4 text-center font-bold">Error conectando al chat: ${error.message}</div>`;
            });
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';
            document.getElementById('send-btn').classList.add('scale-95');
            setTimeout(() => document.getElementById('send-btn').classList.remove('scale-95'), 150);

            try {
                const coleccionStr = activeChatId === 'global' ? 'mensajes_colegio' : `chats_privados/${activeChatId}/mensajes`;
                await addDoc(collection(db, coleccionStr), {
                    text: text,
                    uid: currentUser.uid,
                    name: userData.name,
                    avatar: userData.avatar,
                    createdAt: serverTimestamp() 
                });

                if (activeChatId !== 'global') {
                    const otroUid = activeChatId.split('_').find(id => id !== currentUser.uid);
                    if (otroUid) {
                        const otroUserRef = doc(db, 'usuarios_conectados', otroUid);
                        await setDoc(otroUserRef, {
                            notificaciones: { [currentUser.uid]: Date.now() }
                        }, { merge: true });
                    }
                }

            } catch (error) { console.error("Error al enviar:", error); } 
            finally { messageInput.focus(); }
        });

        // FUNCIÓN DE DIBUJO DE MENSAJES (Ahora completa)
        function renderizarMensajes(mensajes) {
            try {
                const isScrolledToBottom = messagesContainer.scrollHeight - messagesContainer.clientHeight <= messagesContainer.scrollTop + 80;

                if (mensajes.length === 0) {
                    messagesContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-gray-400 text-center opacity-80 pt-10">
                            <div class="text-7xl mb-6 animate-bounce">${activeChatInfo.avatar || '💬'}</div>
                            <p class="text-2xl font-bold text-gray-500 mb-2">¡Mucho silencio por aquí!</p>
                            <p class="text-base font-medium">Anímate y escribe el primer mensaje.</p>
                        </div>`;
                    return;
                }

                let html = '';
                let lastUid = null;

                mensajes.forEach(msg => {
                    const isMe = msg.uid === currentUser.uid;
                    const showHeader = lastUid !== msg.uid;
                    
                    let timeString = '';
                    if (msg.createdAt && typeof msg.createdAt.toDate === 'function') {
                        timeString = msg.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    if (isMe) {
                        html += `
                            <div class="flex justify-end mb-1 group message-wrapper ${showHeader ? 'mt-3' : ''}">
                                <div class="max-w-[80%] md:max-w-[70%]">
                                    <div class="bubble-me p-3.5 px-5 rounded-3xl rounded-tr-sm relative transition-all hover:shadow-lg">
                                        <p class="text-[15px] font-medium leading-relaxed break-words">${escapeHTML(msg.text)}</p>
                                        <span class="text-[10px] text-white/70 absolute bottom-1 right-3 opacity-0 group-hover:opacity-100 transition-opacity font-bold">${timeString}</span>
                                    </div>
                                </div>
                            </div>`;
                    } else {
                        html += `
                            <div class="flex items-end gap-2.5 mb-1 message-wrapper ${showHeader ? 'mt-3' : ''}">
                                ${showHeader ? `<div class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-lg shadow-sm flex-shrink-0">${msg.avatar}</div>` : `<div class="w-8 h-8 flex-shrink-0"></div>`}
                                <div class="max-w-[80%] md:max-w-[70%]">
                                    ${showHeader ? `<p class="text-xs text-gray-500 font-bold mb-1 ml-1">${escapeHTML(msg.name)}</p>` : ''}
                                    <div class="bg-white p-3.5 px-5 rounded-3xl ${showHeader ? 'rounded-tl-sm' : ''} shadow-sm border border-gray-100 relative group transition-all hover:shadow-md">
                                        <p class="text-[15px] text-gray-700 font-medium leading-relaxed break-words">${escapeHTML(msg.text)}</p>
                                        <span class="text-[10px] text-gray-400 absolute bottom-1 right-3 opacity-0 group-hover:opacity-100 transition-opacity font-bold">${timeString}</span>
                                    </div>
                                </div>
                            </div>`;
                    }
                    lastUid = msg.uid;
                });

                messagesContainer.innerHTML = html;
                
                // Hacer scroll hacia abajo automáticamente si estábamos abajo
                if (isScrolledToBottom) {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            } catch (err) {
                console.error("Error al renderizar mensajes:", err);
            }
        }

        // Función para evitar inyecciones de código HTML malicioso
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Eventos del Sidebar
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.remove('hidden');
        });

        function cerrarSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }

        document.getElementById('close-sidebar-btn').addEventListener('click', cerrarSidebar);
        document.getElementById('sidebar-overlay').addEventListener('click', cerrarSidebar);

        // Botón de salir
        document.getElementById('logout-btn').addEventListener('click', () => {
            if (currentUser) {
                const userRef = doc(db, 'usuarios_conectados', currentUser.uid);
                setDoc(userRef, { lastSeen: 0 }, { merge: true }).catch(()=>{});
            }
            auth.signOut();
        });

        // Limpiar estado al cerrar la pestaña
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                const userRef = doc(db, 'usuarios_conectados', currentUser.uid);
                setDoc(userRef, { lastSeen: 0 }, { merge: true }).catch(()=>{});
            }
        });

    </script>
</body>
</html>
